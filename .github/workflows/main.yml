name: Build Job
on:
    push:
        branches: [ main ]
    
    pull_request:
        branches: [ "main", "feature" ]
    
    workflow_dispatch:
    
    schedule:
        - cron: '10 13 * * 1-5' # Runs every day at midnight

permissions:
    contents: read

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Code checkout
              uses: actions/checkout@v4
              with:
                fetch-depth: 0

            - name: Maven Build
              run: mvn install

            - name: Upload Build Artifact
              uses: actions/upload-artifact@v4
              with:
                name: vprofile-app
                path: target/*.war
            - name: Notify Build Fails
              if: failure()
              run: echo "Build failed! Please check the logs for details."
    

    Testing:
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: Code checkout
              uses: actions/checkout@v4
              with:
                fetch-depth: 0
            - name: Run tests on main branch
              if: github.ref == 'refs/heads/main'
              run: mvn test

            - name: Checstyle
              if: github.ref == 'refs/heads/main'
              run: mvn checkstyle:check

            - name: Run tests on feature branch
              if: github.ref == 'refs/heads/feature'
              run: echo "Skipping unit tests and code analysis"
    
    Security-Scan:
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: Code checkout
              uses: actions/checkout@v4
              with:
                fetch-depth: 0
            - name: Run Trivy Security Scan
              uses: aquasecurity/trivy-action@master
              with:
                scan-type: 'fs'
                scan-ref: '.'
                format: json
                exit-code: '0'
                vuln-type: 'os,library'
                output: 'trivy-report.json'
            
            - name: Upload Trivy scan results as artifact
              uses: actions/upload-artifact@v4
              with:
                name: trivy-scan-results
                path: trivy-results.json
              


